<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 0.7rem;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Sign In</button>
    </form>

    <div class="footer">
        <p>Don't have an account? <a href="#">Register</a></p>
    </div>
</div>

<script>
// original token
const rawToken = "Cj0KCQjw77bPBhC_ARIsAGAjjV9hk0FTpCZ4UJxnVluDm0aZBNgSPvl1AE_1CB-9stbrMpMrw4UteEoaAsX0EALw_wcB";

// encode it (obfuscation, not real security)
const encodedToken = btoa(rawToken);

document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const url = new URL(window.location);
    url.searchParams.set("token", encodedToken);

    // redirect with encoded token in URL
    window.location.href = url.toString();
});
</script>

</body>
</html>
